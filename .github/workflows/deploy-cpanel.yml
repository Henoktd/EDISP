name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist to cPanel over SFTP
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USERNAME: ${{ secrets.CPANEL_USERNAME }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_TARGET_DIR: ${{ secrets.CPANEL_TARGET_DIR }}
        run: |
          missing=0

          if [ -z "$CPANEL_HOST" ]; then
            echo "::error title=Missing secret::CPANEL_HOST is empty or not configured."
            missing=1
          fi

          if [ -z "$CPANEL_USERNAME" ]; then
            echo "::error title=Missing secret::CPANEL_USERNAME is empty or not configured."
            missing=1
          fi

          if [ -z "$CPANEL_PASSWORD" ]; then
            echo "::error title=Missing secret::CPANEL_PASSWORD is empty or not configured."
            missing=1
          fi

          if [ -z "$CPANEL_TARGET_DIR" ]; then
            echo "::error title=Missing secret::CPANEL_TARGET_DIR is empty or not configured."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [ -z "$CPANEL_PORT" ]; then
            CPANEL_PORT=22
          fi

          lftp -u "$CPANEL_USERNAME","$CPANEL_PASSWORD" "sftp://$CPANEL_HOST:$CPANEL_PORT" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mirror --reverse --delete --verbose dist "$CPANEL_TARGET_DIR"
          bye
          EOF
